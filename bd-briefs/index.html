<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>BD Intelligence Briefs — Emma Hwang</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --magenta: #9b2671;
      --brown: #7c4a1e;
      --text: #2c2420;
      --text-muted: #5a4a42;
      --text-dim: #a89890;
      --bg: #faf6f0;
      --card: #ffffff;
      --border-card: rgba(0,0,0,0.06);
      --border-brown: rgba(124,74,30,0.18);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 5% 0%, rgba(201,169,110,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 60% 60% at 95% 100%, rgba(155,38,113,0.04) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    .layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--card);
      border-right: 1px solid var(--border-card);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 22px 18px 14px;
      border-bottom: 1px solid var(--border-card);
    }
    .sidebar-eyebrow {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--brown);
      margin-bottom: 4px;
    }
    .sidebar-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a0f0a;
      line-height: 1.3;
      margin-bottom: 9px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.67rem;
      color: var(--text-dim);
      text-decoration: none;
      transition: color .2s;
    }
    .back-link:hover { color: var(--brown); }

    /* ── MINI CALENDAR ── */
    .cal-widget {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border-card);
    }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .cal-month-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
    }
    .cal-arrow {
      background: none;
      border: 1px solid var(--border-card);
      border-radius: 5px;
      width: 22px; height: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim);
      font-size: 0.75rem;
      transition: border-color .15s, color .15s;
    }
    .cal-arrow:hover { border-color: var(--border-brown); color: var(--brown); }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
    }

    .cal-dow {
      text-align: center;
      font-size: 0.56rem;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--text-dim);
      padding-bottom: 5px;
    }

    .cal-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 5px;
      height: 52px;
      border-radius: 6px;
      gap: 2px;
      position: relative;
    }

    .cal-num {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-dim);
      line-height: 1;
    }

    .cal-kws {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      width: 100%;
    }

    .cal-kw {
      font-size: 7.5px;
      font-weight: 600;
      letter-spacing: .01em;
      color: var(--brown);
      line-height: 1.2;
      max-width: 36px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
      display: block;
    }

    .cal-cell.has-brief {
      cursor: pointer;
      transition: background .12s;
    }
    .cal-cell.has-brief:hover { background: rgba(124,74,30,0.08); }
    .cal-cell.has-brief .cal-num { color: var(--text); font-weight: 600; }

    .cal-cell.selected {
      background: var(--magenta) !important;
      border-radius: 6px;
    }
    .cal-cell.selected .cal-num { color: #fff; font-weight: 700; }
    .cal-cell.selected .cal-kw { color: rgba(255,255,255,0.85); }

    .cal-cell.today:not(.selected) {
      outline: 1px solid rgba(124,74,30,0.3);
    }
    .cal-cell.today:not(.selected) .cal-num { color: var(--brown); }

    /* ── DATE LIST ── */
    .date-section {
      flex: 1;
      overflow-y: auto;
      padding: 8px 6px;
    }
    .date-year-label {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 6px 10px 4px;
    }
    .date-list { list-style: none; }
    .date-btn {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      border-left: 2px solid transparent;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 0 5px 5px 0;
      transition: background .12s;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .date-btn:hover { background: rgba(124,74,30,0.06); }
    .date-btn.active {
      background: rgba(155,38,113,0.07);
      border-left-color: var(--magenta);
    }
    .date-label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
    }
    .date-btn.active .date-label { color: var(--magenta); }
    .date-weekday { font-size: 0.63rem; color: var(--text-dim); flex-shrink: 0; }
    .date-kw-tag {
      font-size: 0.62rem;
      color: var(--brown);
      opacity: 0.75;
      margin-left: auto;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: .02em;
    }

    /* ── MAIN CONTENT ── */
    .main { flex: 1; min-width: 0; overflow-y: auto; }
    .content-wrap { padding: 40px 52px 80px; max-width: 820px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 260px;
      gap: 10px;
      color: var(--text-dim);
    }
    .empty-icon { font-size: 2rem; opacity: .35; }
    .empty-state p { font-size: 0.82rem; }

    .loading-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 240px;
      color: var(--text-dim);
      font-size: 0.82rem;
    }

    /* ── MARKDOWN ── */
    .md-content h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a0f0a;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .md-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--brown);
      margin: 32px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(124,74,30,0.12);
    }
    .md-content h3 {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      margin: 22px 0 7px;
    }
    .md-content h4 {
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--text-muted);
      margin: 16px 0 5px;
    }
    .md-content p {
      font-size: 0.86rem;
      line-height: 1.85;
      color: var(--text-muted);
      margin-bottom: 11px;
    }
    .md-content blockquote {
      border-left: 3px solid var(--magenta);
      padding: 11px 16px;
      background: rgba(155,38,113,0.04);
      border-radius: 0 8px 8px 0;
      margin: 14px 0;
    }
    .md-content blockquote p { margin-bottom: 5px; font-size: 0.82rem; }
    .md-content blockquote p:last-child { margin-bottom: 0; }
    .md-content ul, .md-content ol { padding-left: 20px; margin-bottom: 11px; }
    .md-content li {
      font-size: 0.84rem;
      line-height: 1.75;
      color: var(--text-muted);
      margin-bottom: 3px;
    }
    .md-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 0.78rem;
      display: block;
      overflow-x: auto;
    }
    .md-content th {
      background: rgba(124,74,30,0.08);
      color: var(--brown);
      font-weight: 600;
      padding: 8px 12px;
      text-align: left;
      border: 1px solid var(--border-brown);
      white-space: nowrap;
    }
    .md-content td {
      padding: 7px 12px;
      border: 1px solid var(--border-card);
      color: var(--text-muted);
      line-height: 1.5;
    }
    .md-content tr:nth-child(even) td { background: rgba(0,0,0,0.016); }
    .md-content code {
      font-family: 'Courier New', monospace;
      font-size: 0.77rem;
      background: rgba(124,74,30,0.08);
      padding: 2px 5px;
      border-radius: 3px;
      color: var(--brown);
    }
    .md-content pre {
      background: rgba(26,15,10,0.04);
      border: 1px solid var(--border-card);
      border-radius: 8px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 13px 0;
    }
    .md-content pre code {
      background: none; padding: 0;
      color: var(--text);
      font-size: 0.77rem;
      line-height: 1.7;
    }
    .md-content hr {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,74,30,0.14) 20%, rgba(124,74,30,0.14) 80%, transparent);
      margin: 26px 0;
    }
    .md-content a { color: var(--magenta); text-decoration: none; }
    .md-content a:hover { text-decoration: underline; }
    .md-content strong { color: var(--text); font-weight: 600; }
    .wiki-tag {
      display: inline-block;
      background: rgba(155,38,113,0.07);
      border: 1px solid rgba(155,38,113,0.18);
      color: var(--magenta);
      padding: 0 5px;
      border-radius: 4px;
      font-size: 0.76em;
      font-weight: 500;
      line-height: 1.6;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .md-content { animation: fadeIn .22s ease both; }

    /* ── MOBILE ── */
    @media (max-width: 767px) {
      .layout { flex-direction: column; }
      .sidebar {
        width: 100% !important; height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid var(--border-card);
      }
      .cal-widget { padding: 12px; }
      .date-section {
        max-height: 120px;
        overflow-y: hidden;
      }
      .date-list {
        display: flex;
        flex-wrap: nowrap;
        overflow-x: auto;
        gap: 3px;
        scrollbar-width: none;
      }
      .date-list::-webkit-scrollbar { display: none; }
      .date-btn {
        white-space: nowrap;
        border-left: none;
        border-radius: 20px;
        border-bottom: 2px solid transparent;
        padding: 4px 10px;
      }
      .date-btn.active { border-bottom-color: var(--magenta); border-radius: 20px; }
      .date-weekday, .date-kw-tag { display: none; }
      .content-wrap { padding: 20px 16px 60px; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-eyebrow">BD Intelligence</div>
      <div class="sidebar-title">Daily Briefs</div>
      <a class="back-link" href="/">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
        포트폴리오로
      </a>
    </div>

    <!-- Mini Calendar -->
    <div class="cal-widget">
      <div class="cal-nav">
        <button class="cal-arrow" id="calPrev">&#8249;</button>
        <div class="cal-month-label" id="calTitle"></div>
        <button class="cal-arrow" id="calNext">&#8250;</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- Date List -->
    <div class="date-section">
      <div class="date-year-label">전체 목록</div>
      <ul class="date-list" id="dateList">
        <li style="padding:8px 10px;font-size:0.75rem;color:var(--text-dim)">로딩 중…</li>
      </ul>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <div class="main">
    <div class="content-wrap">
      <div id="content">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p>날짜를 선택하면 브리프가 표시됩니다.</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const REPO   = 'Honolululu1234/Honolululu1234.github.io';
  const FOLDER = 'bd-briefs';
  const DAYS_KO   = ['일','월','화','수','목','금','토'];
  const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  // 너무 범용적이라 키워드로 의미없는 단어들
  const SKIP_KW = new Set(['BMS','FDA','EMA','WHO','IND','NDA','PoC','BD','IR','IP',
                            'CEO','CFO','M&A','USA','EU','KR','CN','JP']);

  marked.setOptions({ gfm: true, breaks: false });

  let allEntries   = [];
  let cache        = new Map(); // date → { raw, keywords: [] }
  let selectedDate = null;
  let calYear, calMonth;

  // ── Keyword Extraction ──────────────────────────────
  // Executive Summary의 TOP 3 항목에서 [[wikilink]] 추출
  function extractKeywords(raw) {
    const content = raw.replace(/^---[\s\S]*?---\n?/, '');

    // Executive Summary 섹션 범위 추출
    const execMatch = content.match(
      /Executive Summary([\s\S]{0,1800})(?=\n## Section|\n---\n##|\n## 📋|$)/i
    );
    const area = execMatch ? execMatch[1] : content.slice(0, 2000);

    // [[wikilinks]] 수집
    const links = [...area.matchAll(/\[\[([^\]]+)\]\]/g)]
      .map(m => m[1].trim())
      .filter(t => !SKIP_KW.has(t.toUpperCase()) && t.length >= 2);

    // TOP 3 번호 항목 본문에서 굵은 비-wikilink 단어도 수집 (예: "Milvexian")
    const boldTerms = [...area.matchAll(/\d+\.\s+\*\*(?:\[\[[^\]]+\]\]\s+)?([A-Za-z][A-Za-z0-9\-]+)/g)]
      .map(m => m[1])
      .filter(t => t.length >= 3 && !SKIP_KW.has(t.toUpperCase()));

    const combined = [...links, ...boldTerms];
    const unique   = [...new Map(combined.map(k => [k.toLowerCase(), k])).values()];

    // 최대 2개, 7자 초과시 앞 6자 + 점 생략
    return unique.slice(0, 2).map(k => k.length > 7 ? k.slice(0, 6) + '…' : k);
  }

  // ── Init ────────────────────────────────────────────
  async function init() {
    const today = new Date();
    calYear  = today.getFullYear();
    calMonth = today.getMonth();

    try {
      const res   = await fetch(
        `https://api.github.com/repos/${REPO}/contents/${FOLDER}`,
        { headers: { Accept: 'application/vnd.github.v3+json' } }
      );
      const files = await res.json();

      allEntries = files
        .filter(f => f.type === 'file' && f.name.endsWith('.md') && parseDateStr(f.name))
        .map(f => ({ name: f.name, date: parseDateStr(f.name) }))
        .sort((a, b) => b.date.localeCompare(a.date));

      // Prefetch all files in parallel
      await Promise.all(allEntries.map(fetchAndCache));

      // Jump to latest month
      if (allEntries.length > 0) {
        const d = allEntries[0].date;
        calYear  = +d.slice(0, 4);
        calMonth = +d.slice(5, 7) - 1;
      }

      renderSidebar();
      renderCalendar();
      if (allEntries.length > 0) selectDate(allEntries[0].date);

    } catch (err) {
      document.getElementById('dateList').innerHTML =
        `<li style="padding:8px 10px;font-size:0.75rem;color:var(--text-dim)">목록을 불러올 수 없습니다.</li>`;
      renderCalendar();
    }
  }

  async function fetchAndCache(entry) {
    try {
      const res = await fetch('./' + encodeURIComponent(entry.name));
      if (!res.ok) return;
      const raw      = await res.text();
      const keywords = extractKeywords(raw);
      cache.set(entry.date, { raw, keywords });
    } catch {}
  }

  // ── Utils ───────────────────────────────────────────
  function parseDateStr(name) {
    const m = name.match(/BD_Brief_(\d{4}-\d{2}-\d{2})/);
    return m ? m[1] : null;
  }

  function fmtSidebar(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return { label: `${d.getMonth()+1}월 ${d.getDate()}일`, weekday: DAYS_KO[d.getDay()] };
  }

  function getKeywords(dateStr) {
    return cache.get(dateStr)?.keywords ?? [];
  }

  // ── Sidebar ─────────────────────────────────────────
  function renderSidebar() {
    const list = document.getElementById('dateList');
    list.innerHTML = allEntries.map(e => {
      const { label, weekday } = fmtSidebar(e.date);
      const kws = getKeywords(e.date);
      return `<li>
        <button class="date-btn" data-date="${e.date}" onclick="selectDate('${e.date}')">
          <span class="date-label">${label}</span>
          <span class="date-weekday">${weekday}</span>
          ${kws.length ? `<span class="date-kw-tag">${kws.join(' · ')}</span>` : ''}
        </button>
      </li>`;
    }).join('');
  }

  function updateSidebarActive() {
    document.querySelectorAll('.date-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.date === selectedDate);
    });
    const active = document.querySelector('.date-btn.active');
    if (active) active.scrollIntoView({ block: 'nearest' });
  }

  // ── Calendar ────────────────────────────────────────
  function renderCalendar() {
    document.getElementById('calTitle').textContent =
      `${calYear}년 ${MONTHS_KO[calMonth]}`;

    const today      = new Date().toISOString().slice(0, 10);
    const firstDow   = new Date(calYear, calMonth, 1).getDay();
    const daysInMon  = new Date(calYear, calMonth + 1, 0).getDate();
    const available  = new Set(allEntries.map(e => e.date));

    let html = DAYS_KO.map(d => `<div class="cal-dow">${d}</div>`).join('');
    for (let i = 0; i < firstDow; i++) html += `<div class="cal-cell"></div>`;

    for (let d = 1; d <= daysInMon; d++) {
      const ds  = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const has = available.has(ds);
      const kws = has ? getKeywords(ds) : [];

      const cls = [
        'cal-cell',
        has                  ? 'has-brief' : '',
        ds === selectedDate  ? 'selected'  : '',
        ds === today         ? 'today'     : ''
      ].filter(Boolean).join(' ');

      const click    = has ? `onclick="selectDate('${ds}')"` : '';
      const tipTitle = kws.length ? `title="${kws.join(', ')}"` : '';

      const kwHtml = kws.length
        ? `<div class="cal-kws">${kws.map(k => `<span class="cal-kw">${k}</span>`).join('')}</div>`
        : '';

      html += `<div class="${cls}" ${click} ${tipTitle}>
        <span class="cal-num">${d}</span>
        ${kwHtml}
      </div>`;
    }

    document.getElementById('calGrid').innerHTML = html;
  }

  document.getElementById('calPrev').addEventListener('click', () => {
    if (--calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();
  });
  document.getElementById('calNext').addEventListener('click', () => {
    if (++calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
  });

  // ── Select & Render ──────────────────────────────────
  function selectDate(dateStr) {
    selectedDate = dateStr;
    updateSidebarActive();
    renderCalendar();
    renderContent(dateStr);
  }

  function renderContent(dateStr) {
    const el = document.getElementById('content');
    const entry = cache.get(dateStr);

    if (!entry) {
      el.innerHTML = '<div class="loading-msg">불러오는 중…</div>';
      return;
    }

    const stripped   = entry.raw.replace(/^---[\s\S]*?---\n?/, '').trim();
    const processed  = stripped.replace(/\[\[([^\]]+)\]\]/g,
      '<span class="wiki-tag">$1</span>');

    el.innerHTML = `<div class="md-content">${marked.parse(processed)}</div>`;
  }

  init();
</script>
</body>
</html>
